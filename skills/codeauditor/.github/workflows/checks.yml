name: checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Repo and installer checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tracked files are plain ASCII (no em dashes, en dashes, or emojis)
        run: python3 .github/scripts/check-no-fancy-chars.py

      - name: One name only (no stray old skill name)
        run: |
          TERM="audit""-""codebase"
          if git grep -InF "$TERM" -- .; then
            echo "::error::Found a stray old name reference. The skill is named codeauditor."
            exit 1
          fi
          echo "clean: single name codeauditor"

      - name: Installer is valid bash
        run: bash -n install.sh

      - name: Engine and installer are consistent
        run: |
          test -f engine/codeauditor.md
          head -n 1 engine/codeauditor.md | grep -q '^# codeauditor'
          grep -qF 'engine/$NAME.md' install.sh
          echo "ok"
